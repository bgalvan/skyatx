<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — SKYATX</title>
  <meta name="description" content="Real estate photography and videography portfolio — SKYATX Austin.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .gallery-header {
      padding: 5rem 3rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--light);
      border-radius: 2px;
      background: transparent;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* Property cover grid */
    .property-grid {
      padding: 0 3rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .property-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--light);
      aspect-ratio: 4/3;
    }

    .property-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .property-card:hover img { transform: scale(1.05); }

    .property-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(14,14,14,0.7) 0%, rgba(14,14,14,0) 50%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.25rem;
      transition: background 0.3s;
    }

    .property-card:hover .property-card-overlay {
      background: linear-gradient(to top, rgba(14,14,14,0.82) 0%, rgba(14,14,14,0.1) 60%);
    }

    .property-card-name {
      color: var(--white);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: capitalize;
      margin-bottom: 3px;
    }

    .property-card-meta {
      color: rgba(248,247,244,0.55);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .property-card.hidden { display: none; }

    /* Folder section headers */
    .folder-section { margin-bottom: 3rem; }
    .folder-heading {
      font-size: 11px; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gray);
      padding: 0 3rem; max-width: 1200px; margin: 0 auto 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .folder-heading::after { content:''; flex:1; height:1px; background:var(--light); }

    /* Loading */
    .gallery-status { padding: 0 3rem 3rem; max-width: 1200px; margin: 0 auto; }
    .loading-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .skeleton {
      aspect-ratio: 4/3;
      background: var(--light);
      border-radius: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .empty-state { text-align:center; padding:4rem 0; color:var(--gray); font-size:14px; line-height:2; }

    /* ── LIGHTBOX ───────────────────────────────────────────── */
    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.97);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lb.open { display: flex; }

    .lb-img-wrap {
      max-width: 88vw;
      max-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img-wrap img {
      max-width: 88vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    .lb-img-wrap img.fading { opacity: 0; }

    .lb-close {
      position: fixed;
      top: 1.25rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(248,247,244,0.6);
      font-size: 32px; cursor: pointer;
      padding: 4px 10px; line-height: 1;
      transition: color 0.2s; z-index: 10;
    }
    .lb-close:hover { color: var(--white); }

    .lb-arrow {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(248,247,244,0.5);
      font-size: 2.5rem; cursor: pointer;
      padding: 1.5rem 1.25rem; line-height: 1;
      transition: color 0.2s; z-index: 10;
      user-select: none;
    }
    .lb-arrow:hover { color: var(--white); }
    .lb-arrow:disabled { opacity: 0.15; cursor: default; }
    .lb-prev { left: 0; }
    .lb-next { right: 0; }

    .lb-counter {
      position: fixed;
      top: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(248,247,244,0.35);
    }

    .lb-caption {
      position: fixed;
      bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 13px; letter-spacing: 0.04em;
      color: rgba(248,247,244,0.5);
      white-space: nowrap;
      text-transform: capitalize;
    }

    @media (max-width: 900px) {
      .property-grid, .loading-grid { grid-template-columns: repeat(2, 1fr); padding: 0 1.5rem 3rem; }
      .gallery-header { padding: 4rem 1.5rem 2rem; }
      .folder-heading, .gallery-status { padding: 0 1.5rem; }
    }
    @media (max-width: 500px) {
      .property-grid, .loading-grid { grid-template-columns: 1fr; }
      .lb-arrow { font-size: 1.75rem; padding: 1rem 0.75rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SKYATX</a>
  <button class="nav-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="pricing.html">Pricing</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="book.html" class="nav-book">Book a shoot</a>
</nav>

<div class="page">
  <div class="gallery-header fade-in">
    <span class="eyebrow">Portfolio</span>
    <h1>Our work</h1>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Photos">Photography</button>
      <button class="filter-btn" data-filter="Drone">Drone</button>
      <button class="filter-btn" data-filter="Video">Video</button>
    </div>
  </div>
  <div id="galleryRoot"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Property photo viewer">
  <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
  <span class="lb-counter" id="lbCounter"></span>
  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous">&#8592;</button>
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="">
  </div>
  <button class="lb-arrow lb-next" id="lbNext" aria-label="Next">&#8594;</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<footer>
  <span>© 2026 SKYATX · Austin, TX</span>
  <span><a href="mailto:info@skyatx.com">info@skyatx.com</a></span>
</footer>

<script src="js/main.js"></script>
<script>
  const API_KEY    = 'AIzaSyBY1QA-5RK6E6mgR-tTQixLWn8ekb_v7sw';
  const ROOT_ID    = '1eSAKXzuxbWW01ASWjgqIRg2MnYcwNiQF';
  const TYPE_ORDER  = ['Photos','Drone','Video'];
  const TYPE_LABELS = { Photos:'Photography', Drone:'Drone', Video:'Video' };

  const galleryRoot = document.getElementById('galleryRoot');
  let properties   = [];   // [{type, name, folderId, files:[{id,name,mimeType}]}]
  let activeFilter = 'all';

  // ── API ──────────────────────────────────────────────────────
  async function listChildren(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files`
      + `?q='${folderId}'+in+parents+and+trashed=false`
      + `&fields=files(id,name,mimeType)`
      + `&orderBy=name`
      + `&key=${API_KEY}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Drive API error ' + r.status);
    return (await r.json()).files || [];
  }

  function thumbUrl(id) { return `https://drive.google.com/thumbnail?id=${id}&sz=w800`; }
  function fullUrl(id)  { return `https://drive.google.com/thumbnail?id=${id}&sz=w1600`; }

  // ── Lightbox ─────────────────────────────────────────────────
  let lbFiles = [];   // current property's file list
  let lbIndex = 0;
  let lbPropertyName = '';

  const lb        = document.getElementById('lb');
  const lbImg     = document.getElementById('lbImg');
  const lbCaption = document.getElementById('lbCaption');
  const lbCounter = document.getElementById('lbCounter');
  const lbPrev    = document.getElementById('lbPrev');
  const lbNext    = document.getElementById('lbNext');
  const lbClose   = document.getElementById('lbClose');

  function openLightbox(files, propertyName, index) {
    lbFiles = files;
    lbPropertyName = propertyName;
    lbIndex = index;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    showSlide(false);
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showSlide(animate) {
    const file = lbFiles[lbIndex];
    if (animate) {
      lbImg.classList.add('fading');
      setTimeout(() => { setSlide(file); lbImg.classList.remove('fading'); }, 200);
    } else {
      setSlide(file);
    }
    lbPrev.disabled = lbIndex === 0;
    lbNext.disabled = lbIndex === lbFiles.length - 1;
    lbCounter.textContent = (lbIndex + 1) + ' / ' + lbFiles.length;
  }

  function setSlide(file) {
    lbImg.src = fullUrl(file.id);
    lbImg.alt = lbPropertyName;
    lbCaption.textContent = lbPropertyName;
  }

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  lbPrev.addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; showSlide(true); } });
  lbNext.addEventListener('click', () => { if (lbIndex < lbFiles.length - 1) { lbIndex++; showSlide(true); } });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft'  && lbIndex > 0) { lbIndex--; showSlide(true); }
    if (e.key === 'ArrowRight' && lbIndex < lbFiles.length - 1) { lbIndex++; showSlide(true); }
  });

  // ── Loading state ────────────────────────────────────────────
  function showLoading() {
    galleryRoot.innerHTML = `<div class="gallery-status"><div class="loading-grid">
      ${Array(6).fill('<div class="skeleton"></div>').join('')}
    </div></div>`;
  }

  // ── Render ───────────────────────────────────────────────────
  function renderGallery() {
    const visible = activeFilter === 'all'
      ? properties
      : properties.filter(p => p.type === activeFilter);

    if (!visible.length) {
      galleryRoot.innerHTML = `<div class="gallery-status"><div class="empty-state">
        No properties found. Add folders inside Photos, Drone, or Video in your Google Drive.
      </div></div>`;
      return;
    }

    // Group by type
    const byType = {};
    visible.forEach(p => {
      if (!byType[p.type]) byType[p.type] = [];
      byType[p.type].push(p);
    });

    let html = '';
    TYPE_ORDER.filter(t => byType[t]).forEach(type => {
      const props = byType[type];
      const label = TYPE_LABELS[type] || type;

      html += `<div class="folder-section" data-type="${type}">`;
      html += `<div class="folder-heading"><span>${label}</span></div>`;
      html += `<div class="property-grid">`;

      props.forEach(prop => {
        const cover = prop.files[0];
        const count = prop.files.length;
        const propIdx = properties.indexOf(prop);
        html += `
          <div class="property-card" data-prop-index="${propIdx}"
               tabindex="0" role="button" aria-label="View ${prop.name}">
            <img src="${thumbUrl(cover.id)}" alt="${prop.name}" loading="lazy">
            <div class="property-card-overlay">
              <div class="property-card-name">${prop.name}</div>
              <div class="property-card-meta">${count} photo${count !== 1 ? 's' : ''}</div>
            </div>
          </div>`;
      });

      html += `</div></div>`;
    });

    galleryRoot.innerHTML = html;

    // Attach click handlers
    galleryRoot.querySelectorAll('.property-card').forEach(card => {
      const open = () => {
        const prop = properties[parseInt(card.dataset.propIndex)];
        openLightbox(prop.files, prop.name, 0);
      };
      card.addEventListener('click', open);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    });

    // Staggered fade in
    galleryRoot.querySelectorAll('.property-card').forEach((el, i) => {
      el.style.opacity = '0';
      el.style.transition = `opacity 0.4s ease ${Math.min(i * 0.06, 0.7)}s`;
      requestAnimationFrame(() => { el.style.opacity = '1'; });
    });
  }

  // ── Filter ───────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGallery();
    });
  });

  // ── Load from Drive ──────────────────────────────────────────
  async function loadGallery() {
    showLoading();
    const imageTypes = ['image/jpeg','image/png','image/webp','image/gif'];
    try {
      const typeFolders = await listChildren(ROOT_ID);

      for (const typeFolder of typeFolders) {
        if (typeFolder.mimeType !== 'application/vnd.google-apps.folder') continue;
        const propFolders = await listChildren(typeFolder.id);

        for (const propFolder of propFolders) {
          if (propFolder.mimeType !== 'application/vnd.google-apps.folder') continue;
          const files = await listChildren(propFolder.id);
          const images = files.filter(f =>
            imageTypes.includes(f.mimeType) || (f.mimeType && f.mimeType.startsWith('video/'))
          );
          if (images.length === 0) continue;

          properties.push({
            type:  typeFolder.name,
            name:  propFolder.name,
            files: images
          });
        }
      }

      renderGallery();
    } catch(err) {
      console.error(err);
      galleryRoot.innerHTML = `<div class="gallery-status"><div class="empty-state">
        Couldn't load gallery. Make sure your Drive folder is set to
        <strong>Anyone with the link can view</strong> and refresh.
        <br><br><small style="color:#bbb">${err.message}</small>
      </div></div>`;
    }
  }

  loadGallery();
</script>
</body>
</html>
