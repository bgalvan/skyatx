<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — SKYATX</title>
  <meta name="description" content="Real estate photography and videography portfolio — SKYATX Austin.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .gallery-header {
      padding: 5rem 3rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--light);
      border-radius: 2px;
      background: transparent;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    .gallery-grid {
      padding: 0 3rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
      columns: 3;
      column-gap: 4px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--light);
      display: block;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img { transform: scale(1.04); }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14,14,14,0);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
      transition: background 0.3s;
    }

    .gallery-item:hover .gallery-item-overlay { background: rgba(14,14,14,0.38); }

    .gallery-item-label {
      color: var(--white);
      font-size: 13px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
      text-transform: capitalize;
    }
    .gallery-item:hover .gallery-item-label { opacity: 1; transform: translateY(0); }

    .gallery-status { padding: 0 3rem 3rem; max-width: 1200px; margin: 0 auto; }
    .loading-grid { columns: 3; column-gap: 4px; }
    .skeleton {
      break-inside: avoid;
      margin-bottom: 4px;
      background: var(--light);
      border-radius: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .empty-state { text-align:center; padding:4rem 0; color:var(--gray); font-size:14px; line-height:2; }

    .folder-section { margin-bottom: 3rem; }
    .folder-heading {
      font-size: 11px; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gray);
      padding: 0 3rem; max-width: 1200px; margin: 0 auto 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .folder-heading::after { content:''; flex:1; height:1px; background:var(--light); }

    /* ── LIGHTBOX ───────────────────────────────────────────── */
    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.97);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lb.open { display: flex; }

    .lb-img-wrap {
      max-width: 88vw;
      max-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .lb-img-wrap img {
      max-width: 88vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
      border-radius: 2px;
      transition: opacity 0.25s;
    }
    .lb-img-wrap img.fading { opacity: 0; }

    .lb-close {
      position: fixed;
      top: 1.25rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(248,247,244,0.6);
      font-size: 32px; cursor: pointer;
      padding: 4px 10px; line-height: 1;
      transition: color 0.2s; z-index: 10;
    }
    .lb-close:hover { color: var(--white); }

    .lb-arrow {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(248,247,244,0.5);
      font-size: 2.5rem; cursor: pointer;
      padding: 1.5rem 1.25rem; line-height: 1;
      transition: color 0.2s; z-index: 10;
      user-select: none;
    }
    .lb-arrow:hover { color: var(--white); }
    .lb-arrow:disabled { opacity: 0.15; cursor: default; }
    .lb-prev { left: 0; }
    .lb-next { right: 0; }

    .lb-counter {
      position: fixed;
      top: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(248,247,244,0.35);
    }

    .lb-caption {
      position: fixed;
      bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 13px; letter-spacing: 0.04em;
      color: rgba(248,247,244,0.5);
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .gallery-grid, .loading-grid { columns: 2; padding: 0 1.5rem 3rem; }
      .gallery-header { padding: 4rem 1.5rem 2rem; }
      .folder-heading, .gallery-status { padding: 0 1.5rem; }
    }
    @media (max-width: 500px) {
      .gallery-grid, .loading-grid { columns: 1; }
      .lb-arrow { font-size: 1.75rem; padding: 1rem 0.75rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SKYATX</a>
  <button class="nav-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="pricing.html">Pricing</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="book.html" class="nav-book">Book a shoot</a>
</nav>

<div class="page">
  <div class="gallery-header fade-in">
    <span class="eyebrow">Portfolio</span>
    <h1>Our work</h1>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="photos">Photography</button>
      <button class="filter-btn" data-filter="drone">Drone</button>
      <button class="filter-btn" data-filter="video">Video</button>
    </div>
  </div>
  <div id="galleryRoot"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Image lightbox">
  <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
  <span class="lb-counter" id="lbCounter"></span>
  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous image">&#8592;</button>
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="">
  </div>
  <button class="lb-arrow lb-next" id="lbNext" aria-label="Next image">&#8594;</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<footer>
  <span>© 2026 SKYATX · Austin, TX</span>
  <span><a href="mailto:info@skyatx.com">info@skyatx.com</a></span>
</footer>

<script src="js/main.js"></script>
<script>
  // ── Config ───────────────────────────────────────────────────
  const CLOUD = 'dzw3qssgp';
  const ROOT_FOLDER = 'skyatx';
  const TYPE_ORDER  = ['photos','drone','video'];
  const TYPE_LABELS = { photos:'Photography', drone:'Drone', video:'Video' };

  const galleryRoot = document.getElementById('galleryRoot');
  let allItems   = [];
  let activeFilter = 'all';

  // ── Cloudinary URL helpers ───────────────────────────────────
  function thumbUrl(publicId) {
    return `https://res.cloudinary.com/${CLOUD}/image/upload/c_fill,w_800,q_auto,f_auto/${publicId}`;
  }

  function fullUrl(publicId) {
    return `https://res.cloudinary.com/${CLOUD}/image/upload/c_limit,w_1800,q_auto,f_auto/${publicId}`;
  }

  function isVideo(resourceType) { return resourceType === 'video'; }

  // ── Cloudinary Search API ────────────────────────────────────
  async function fetchResources() {
    // Use the resource list endpoint — reads all images under the skyatx/ folder
    const url = `https://res.cloudinary.com/${CLOUD}/image/list/${ROOT_FOLDER}.json`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Could not load images (status ' + r.status + '). Make sure Resource list is enabled in Cloudinary Settings → Security.');
    const data = await r.json();
    return data.resources || [];
  }

  // ── Parse folder structure ───────────────────────────────────
  // Expected public_id format: skyatx/photos/property-name/filename
  function parseItem(resource) {
    const parts = resource.public_id.split('/');
    // parts[0] = skyatx, parts[1] = type, parts[2] = property, parts[3] = filename
    if (parts.length < 3) return null;
    const type     = parts[1].toLowerCase();
    const property = parts[2] ? parts[2].replace(/-/g, ' ') : 'Property';
    return {
      publicId:     resource.public_id,
      type:         type,
      property:     property,
      resourceType: resource.resource_type || 'image',
      format:       resource.format
    };
  }

  // ── Lightbox ─────────────────────────────────────────────────
  let lbItems = [];
  let lbIndex = 0;

  const lb        = document.getElementById('lb');
  const lbImg     = document.getElementById('lbImg');
  const lbCaption = document.getElementById('lbCaption');
  const lbCounter = document.getElementById('lbCounter');
  const lbPrev    = document.getElementById('lbPrev');
  const lbNext    = document.getElementById('lbNext');
  const lbClose   = document.getElementById('lbClose');

  function openLightbox(items, index) {
    lbItems = items;
    lbIndex = index;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    showLbSlide(false);
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showLbSlide(animate) {
    const item = lbItems[lbIndex];
    if (animate) {
      lbImg.classList.add('fading');
      setTimeout(() => {
        setLbContent(item);
        lbImg.classList.remove('fading');
      }, 200);
    } else {
      setLbContent(item);
    }
    lbPrev.disabled = lbIndex === 0;
    lbNext.disabled = lbIndex === lbItems.length - 1;
    lbCounter.textContent = (lbIndex + 1) + ' / ' + lbItems.length;
  }

  function setLbContent(item) {
    lbImg.src = fullUrl(item.publicId);
    lbImg.alt = item.property;
    lbCaption.textContent = item.property
      + (item.type && TYPE_LABELS[item.type] ? '  ·  ' + TYPE_LABELS[item.type] : '');
  }

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  lbPrev.addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; showLbSlide(true); } });
  lbNext.addEventListener('click', () => { if (lbIndex < lbItems.length-1) { lbIndex++; showLbSlide(true); } });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft'  && lbIndex > 0) { lbIndex--; showLbSlide(true); }
    if (e.key === 'ArrowRight' && lbIndex < lbItems.length-1) { lbIndex++; showLbSlide(true); }
  });

  // ── Render ───────────────────────────────────────────────────
  function showLoading() {
    const h = [280,240,320,200,300,260,220,290,250];
    galleryRoot.innerHTML = `<div class="gallery-status"><div class="loading-grid">
      ${h.map(x => `<div class="skeleton" style="height:${x}px"></div>`).join('')}
    </div></div>`;
  }

  function getVisible() {
    return activeFilter === 'all' ? allItems : allItems.filter(i => i.type === activeFilter);
  }

  function renderGallery() {
    if (!allItems.length) {
      galleryRoot.innerHTML = `<div class="gallery-status"><div class="empty-state">
        No images found yet.<br>
        Upload photos to <strong>skyatx/photos/</strong>, <strong>skyatx/drone/</strong>, or <strong>skyatx/video/</strong>
        in your Cloudinary Media Library and refresh.
      </div></div>`;
      return;
    }

    const byType = {};
    allItems.forEach(item => {
      if (!byType[item.type]) byType[item.type] = [];
      byType[item.type].push(item);
    });

    const types = TYPE_ORDER.filter(t => byType[t] && byType[t].length);
    let html = '';

    types.forEach(type => {
      const items  = byType[type];
      const label  = TYPE_LABELS[type] || type;
      const hidden = activeFilter !== 'all' && activeFilter !== type;

      html += `<div class="folder-section" data-type="${type}" ${hidden ? 'style="display:none"' : ''}>`;
      html += `<div class="folder-heading"><span>${label}</span></div>`;
      html += `<div class="gallery-grid">`;

      items.forEach(item => {
        const globalIdx = allItems.indexOf(item);
        html += `
          <div class="gallery-item" data-index="${globalIdx}" tabindex="0"
               role="button" aria-label="View ${item.property}">
            <img src="${thumbUrl(item.publicId)}"
                 alt="${item.property}" loading="lazy">
            <div class="gallery-item-overlay">
              <span class="gallery-item-label">${item.property}</span>
            </div>
          </div>`;
      });

      html += `</div></div>`;
    });

    galleryRoot.innerHTML = html;

    // Click handlers
    galleryRoot.querySelectorAll('.gallery-item').forEach(el => {
      const open = () => {
        const idx = parseInt(el.dataset.index);
        const visible = getVisible();
        const visIdx  = visible.indexOf(allItems[idx]);
        openLightbox(visible, visIdx >= 0 ? visIdx : 0);
      };
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    });

    // Staggered fade in
    galleryRoot.querySelectorAll('.gallery-item').forEach((el, i) => {
      el.style.opacity = '0';
      el.style.transition = `opacity 0.4s ease ${Math.min(i * 0.04, 0.8)}s`;
      requestAnimationFrame(() => { el.style.opacity = '1'; });
    });
  }

  // ── Filter ───────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      document.querySelectorAll('.folder-section').forEach(s => {
        s.style.display = (activeFilter === 'all' || s.dataset.type === activeFilter) ? '' : 'none';
      });
    });
  });

  // ── Load ─────────────────────────────────────────────────────
  async function loadGallery() {
    showLoading();
    try {
      const resources = await fetchResources();
      allItems = resources.map(parseItem).filter(Boolean);
      renderGallery();
    } catch(err) {
      console.error(err);
      galleryRoot.innerHTML = `<div class="gallery-status"><div class="empty-state">
        ${err.message}<br><br>
        <small>Go to Cloudinary → Settings → Security → uncheck "Restrict resource list"</small>
      </div></div>`;
    }
  }

  loadGallery();
</script>
</body>
</html>
